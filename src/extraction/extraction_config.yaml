# ── Data Extraction Configuration ──
#
# Everything configurable for the extraction pipeline.
# Change parameters here, not in the Python files.

# ── Model ──
model:
  hf_name: "meta-llama/Meta-Llama-3.1-8B"
  mlx_name: "mlx-community/Meta-Llama-3.1-8B-bf16"
  num_layers: 32
  num_q_heads: 32
  num_kv_heads: 8
  head_dim: 128
  context_window: 131072
  rope:
    theta: 500000.0
    method: "standard"
    source: "model.rotary_emb"

# ── Tasks to Extract ──
# Only listed tasks are extracted. To add more, see
# "Other Available Tasks" at the bottom of this file.
tasks:
  - math_calc            # ~19K tok, arithmetic sums
  - code_run             # ~75K tok, predict code output
  - longbook_sum_eng     # ~120K tok, book summarization
  - kv_retrieval         # ~100K+ tok, key-value dictionary lookup
  - multi_doc_qa         # ~61K tok, multi-document QA
  - single_doc_qa        # ~85K tok, single-document QA

# ── Task Source Definitions ──
# Maps task name -> HuggingFace dataset + filter.
task_sources:
  math_calc:
    benchmark: "infinitebench"
    hf_name: "xinrongzhang2022/InfiniteBench"
    filter_field: "task"
    filter_value: "math_calc"
  code_run:
    benchmark: "infinitebench"
    hf_name: "xinrongzhang2022/InfiniteBench"
    filter_field: "task"
    filter_value: "code_run"
  longbook_sum_eng:
    benchmark: "infinitebench"
    hf_name: "xinrongzhang2022/InfiniteBench"
    filter_field: "task"
    filter_value: "longbook_sum_eng"
  kv_retrieval:
    benchmark: "infinitebench"
    hf_name: "xinrongzhang2022/InfiniteBench"
    filter_field: "task"
    filter_value: "kv_retrieval"
  multi_doc_qa:
    benchmark: "longbench_v2"
    hf_name: "THUDM/LongBench-v2"
    filter_field: "domain"
    filter_value: "Multi-Document QA"
  single_doc_qa:
    benchmark: "longbench_v2"
    hf_name: "THUDM/LongBench-v2"
    filter_field: "domain"
    filter_value: "Single-Document QA"

# ── Prompt ──
prompt_template: "Context: {context}\n\nQuestion: {question}\n\nAnswer:"

# ── Extraction ──
extraction:
  examples_per_task: 1      # examples to extract per task
  max_length: 125000        # starting limit; auto-reduced on OOM (125K→115K→105K→95K)
  storage_format: "pt_bfloat16"
  store_raw_vectors: true   # pre-RoPE Q and K
  store_rope_vectors: true  # post-RoPE Q and K
  layers: [0, 1,2 , 3, 6, 7, 8, 12, 15, 17, 18, 19, 25, 27, 30, 31]  # 16 layers spanning the network (use "all" only with >40GB VRAM)

# ═══════════════════════════════════════════════════
# Head Selection
# ═══════════════════════════════════════════════════
#
# Stats computed from the first (shortest) example per
# task, all heads. Selected heads are then extracted for
# all examples.
#
# "auto": compute stats from scout example, select by
#         percentile (default)
# Or explicit [layer, q_head] pairs to skip the scout pass:
#   explicit: [[17, 5], [19, 12]]
#
head_selection:
  mode: "auto"
  metric: "nonlocal_entropy"    # ranking metric for percentile selection
  # Percentile positions (0=min entropy/most concentrated,
  # 100=max/most diffuse)
  percentiles: [0, 25, 50, 75, 100]   # -> 5 heads

# ── Head Statistics ──
# Computed during the scout pass to profile every head.
# Stats are averaged over the last n_queries positions.
head_statistics:
  top_pct_for_mass: [1, 5]    # compute mass in top 1% and top 5%
  n_queries: 10               # last N query positions per head
  n_sink_tokens: 1            # tokens excluded as "sink" (position 0)
  local_window: 1024          # tokens excluded as "local" (last N)
  compute_all_examples: true  # compute stats for all N examples (adds N forward passes)

# ── Output Paths ──
# Relative to --data-root (default: ../data/)
output:
  vectors_subdir: "vectors"
  head_stats_subdir: "head_statistics/llama3.1_8b"
  benchmarks_subdir: "benchmarks"


# ═══════════════════════════════════════════════════
# Other Available Tasks
# ═══════════════════════════════════════════════════
#
# To use any of these: add the task name to `tasks`
# above, and uncomment its `task_sources` entry here.
#
# ── InfiniteBench (7 more tasks) ──
#
# longbook_qa_eng      — free-form QA on a synthetic book (~100K tok)
# longbook_choice_eng  — multiple-choice QA on a synthetic book (~100K tok)
# longdialogue_qa_eng  — identify speakers in anonymized scripts (~100K tok)
# code_debug           — find the buggy function in a code repo (~100K tok)
# math_find            — locate a special integer in a long list (~100K tok)
# number_string        — find repeated numbers in noisy context (~100K tok)
# kv_retrieval         — key-value dictionary lookup (~100K tok)
#
# ── LongBench v2 (4 more domains) ──
#
# long_in_context_learning  — few-shot learning with long context
# long_dialogue_history     — comprehension of extended conversations
