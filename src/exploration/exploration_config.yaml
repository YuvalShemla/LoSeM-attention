# ══════════════════════════════════════════════════════
# Exploration Configuration
# ══════════════════════════════════════════════════════
#
# Controls the data analysis / exploration pipeline.
# Exploration runs on a single head per task, computing
# attention statistics and diagnostic plots to understand
# the attention landscape before running experiments.

# ── Model ──
model:
  hf_name: "meta-llama/Meta-Llama-3.1-8B"
  num_q_heads: 32
  num_kv_heads: 8
  head_dim: 128

# ── Data Paths ──
data:
  vectors_dir: "data/vectors"
  results_dir: "results"

# ── Tasks ──
tasks:
  - math_calc
  - code_run
  - longbook_sum_eng
  - passkey
  - multi_doc_qa
  - single_doc_qa

# ══════════════════════════════════════════════════════
# Exploration Scope
# ══════════════════════════════════════════════════════

exploration:
  seed: 42

  # How many examples to load per task.
  n_examples: 1

  # How many query positions to sample per example.
  # Sampled uniformly from valid range (excluding
  # sink tokens and local window).
  n_queries: 200

  # Which head to analyze.
  layer: 17
  q_head: 0
  kv_head: 0

  # Attention structure parameters.
  attention_sink:
    n_sink_tokens: 1
  local_window:
    size: 1024

# ══════════════════════════════════════════════════════
# Plots
# ══════════════════════════════════════════════════════
#
# Which analyses to run. Each name maps to a
# (compute_fn, plot_fn) pair in the PLOT_REGISTRY.
# Comment out plots you don't need.

plots:
  - attention_concentration
  - entropy_distribution
  - kv_norm_correlation
  - topk_vs_sampling_bias

# ── Per-Plot Settings ──

# attention_concentration: How much mass is in the top-K keys?
concentration:
  top_k_values: [10, 50, 100, 200, 500]

# entropy_distribution: uses attention_sink and local_window
# from exploration section above (no extra settings).

# kv_norm_correlation: correlation between ||K|| and ||V||
# for the top-scoring keys.
kv_norms:
  top_pct: 10.0           # percentage of keys considered "top"

# topk_vs_sampling_bias: compare TopK, Uniform, Oracle
# at various budget fractions.
bias_comparison:
  budget_fractions:
    - 0.01
    - 0.03
    - 0.05
    - 0.1
    - 0.2
    - 0.5
