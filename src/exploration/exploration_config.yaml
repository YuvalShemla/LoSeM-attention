# ══════════════════════════════════════════════════════
# Exploration Configuration
# ══════════════════════════════════════════════════════
#
# Controls the data analysis / exploration pipeline.
# Exploration computes attention statistics and
# diagnostic plots to understand the attention
# landscape before running experiments.

# ── Model ──
model:
  hf_name: "meta-llama/Meta-Llama-3.1-8B"
  num_q_heads: 32
  num_kv_heads: 8
  head_dim: 128

# ── Data Paths ──
data:
  vectors_dir: "data/vectors"
  results_dir: "results"

# ── Tasks ──
tasks:
  - math_calc
  - code_run
  - longbook_sum_eng
  - kv_retrieval
  - multi_doc_qa
  - single_doc_qa

# ══════════════════════════════════════════════════════
# Exploration Scope
# ══════════════════════════════════════════════════════

exploration:
  seed: 42

  # Use post-RoPE vectors (true) or raw pre-RoPE (false).
  use_rope: true

  # How many examples to load per task.
  n_examples: 1

  # How many query positions to sample per example.
  # Sampled from the last N token positions.
  n_queries: 100

  # Which heads to analyze.
  #
  # head_mode options:
  #   "selected_heads" — reads selected heads from
  #     metadata.json per task, iterates all of them.
  #     Generates per-head plots + side-by-side summaries.
  #
  #   "custom" — uses the single head specified below.
  #     Useful for debugging or quick single-head runs.
  #
  head_mode: "selected_heads"

  # Used only when head_mode is "custom".
  layer: 17
  q_head: 0
  kv_head: 0

  # Attention structure parameters.
  exclude_sink_token: true
  local_window:
    size: 1024

# ══════════════════════════════════════════════════════
# Per-Analysis Settings
# ══════════════════════════════════════════════════════

# attention_concentration: How much mass is in the top-K keys?
concentration:
  top_k_values: [10, 50, 100, 200, 500]

# kv_norm_correlation: correlation between ||K|| and ||V||
# for the top-scoring keys.
kv_norms:
  top_pct: 10.0

# approximation_methods: compare TopK, Uniform, Oracle
# at various absolute budget sizes (number of keys).
bias_comparison:
  budgets:
    - 16
    - 32
    - 64
    - 128
    - 512
    - 1024
    - 2048
    - 4096
    - 8192
    - 16384

# ══════════════════════════════════════════════════════
# Pairwise Similarity Settings
# ══════════════════════════════════════════════════════

pairwise:
  n_distance_bins: 15           # bins for "vs distance" plots (percentile-based)
  n_comparison_positions: 20000 # max comparison targets per anchor (subsampled from full context)
  ema_span: 200                 # EMA span for smoothing curve in vs-distance scatter

# ══════════════════════════════════════════════════════
# Embedding Projection Settings
# ══════════════════════════════════════════════════════

embedding:
  n_fit: 50000                  # vectors for fitting projections (25K Q + 25K K)
  n_plot: 15000                 # vectors to display in scatter plots
  n_metric_pairs: 5000          # pairs sampled for cluster separation metrics
  tsne_perplexity: 100.0        # higher perplexity for better global structure at 30K scale
  tsne_max_iter: 1500           # safer convergence
  tsne_init: "pca"              # PCA init for stable, reproducible embeddings
  tsne_learning_rate: "auto"    # auto-scaled learning rate
  umap_n_neighbors: 150         # emphasize global structure
  umap_min_dist: 0.3            # spread clusters for global view
  umap_metric: "cosine"         # directional metric matching Q-K geometry
