# ── InfiniteBench (7 more tasks) ──
#
# longbook_qa_eng      — free-form QA on a synthetic book (~100K tok)
# longbook_choice_eng  — multiple-choice QA on a synthetic book (~100K tok)
# longdialogue_qa_eng  — identify speakers in anonymized scripts (~100K tok)
# code_debug           — find the buggy function in a code repo (~100K tok)
# math_find            — locate a special integer in a long list (~100K tok)
# number_string        — find repeated numbers in noisy context (~100K tok)
# kv_retrieval         — key-value dictionary lookup (~100K tok)
